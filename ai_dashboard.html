<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Локальный ИИ | AntiGravity</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --user-msg: rgba(99, 102, 241, 0.2);
            --ai-msg: rgba(16, 185, 129, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 50%);
        }

        .header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .model-selector {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-family: 'Inter';
            outline: none;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 80%;
            padding: 20px;
            border-radius: 16px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        .msg-user {
            background: var(--user-msg);
            border: 1px solid rgba(99, 102, 241, 0.3);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-ai {
            background: var(--ai-msg);
            border: 1px solid rgba(16, 185, 129, 0.3);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 30px 40px;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .input-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            font-family: 'Inter';
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
        }

        button {
            padding: 0 30px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-brain" style="color: var(--primary);"></i> AntiGravity AI Factory</h1>
        <select id="model-select" class="model-selector">
            <option value="gemma4:26b-lite">gemma4:26b-lite (Кастомная для 16GB RAM)</option>
            <option value="deepseek-r1:8b">deepseek-r1:8b (Рекомендуется для 8GB VRAM)</option>
            <option value="gemma4:26b">gemma4:26b (Полная - может вылетать)</option>
        </select>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="message msg-ai">
            <strong><i class="fas fa-robot"></i> Система:</strong><br><br>
            Локальный ИИ-инженер готов к работе. Выберите модель в правом верхнем углу и напишите свой запрос.<br><br>
            <span style="color: var(--text-dim); font-size: 0.9em;">(Модели весом более 15ГБ будут генерировать ответ 3-4 минуты из-за ограничений вашей видеопамяти RTX 50-серии).</span>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="ai-input" placeholder="Введите ваш запрос..." onkeypress="if(event.key === 'Enter') sendToOllama()">
            <button onclick="sendToOllama()">Отправить <i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // Попытка автоматически подгрузить список моделей с локального сервера
        async function fetchModels() {
            try {
                const res = await fetch('http://localhost:11434/api/tags');
                const data = await res.json();
                if(data.models && data.models.length > 0) {
                    const select = document.getElementById('model-select');
                    // Сохраняем gemma4:26b-lite если она есть, иначе очищаем
                    const currentOptions = select.innerHTML;
                    select.innerHTML = '';
                    data.models.forEach(m => {
                        select.innerHTML += `<option value="${m.name}">${m.name}</option>`;
                    });
                    // Проверяем, есть ли lite версия
                    if(!data.models.find(m => m.name === 'gemma4:26b-lite')) {
                        select.innerHTML += `<option value="gemma4:26b-lite">gemma4:26b-lite (Кастомная)</option>`;
                    }
                    select.value = 'gemma4:26b-lite';
                }
            } catch(e) {
                console.log("Не удалось загрузить список моделей", e);
            }
        }
        fetchModels();

        async function sendToOllama() {
            const input = document.getElementById('ai-input');
            const chatBox = document.getElementById('chat-box');
            const prompt = input.value.trim();
            const selectedModel = document.getElementById('model-select').value;
            
            if (!prompt) return;

            // Сообщение юзера
            chatBox.innerHTML += `
                <div class="message msg-user">
                    <strong><i class="fas fa-user"></i> Вы:</strong><br><br>
                    ${prompt}
                </div>`;
            input.value = '';
            
            const aiMsgId = 'msg-' + Date.now();
            chatBox.innerHTML += `
                <div class="message msg-ai" id="${aiMsgId}">
                    <strong><i class="fas fa-robot"></i> ${selectedModel}:</strong><br><br>
                    <span><i class="fas fa-circle-notch fa-spin"></i> Обработка локально на вашем ПК...</span>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: selectedModel,
                        prompt: prompt,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error('Ollama недоступна');

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                const span = document.querySelector(`#${aiMsgId} span`);
                span.innerHTML = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        const json = JSON.parse(line);
                        // Очистка и замена переносов строк
                        let text = json.response.replace(/\n/g, '<br>');
                        span.innerHTML += text;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                }
            } catch (err) {
                document.querySelector(`#${aiMsgId} span`).innerHTML = `<span style="color: #ef4444;"><i class="fas fa-exclamation-triangle"></i> Ошибка: ${err.message}. Убедитесь, что приложение Ollama запущено в Windows!</span>`;
            }
        }
    </script>
</body>
</html>
